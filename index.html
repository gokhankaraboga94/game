<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuşatma Ustası: Kale Muhafızları</title>
    <style>
        :root { --p-color: #00d2ff; --e-color: #ff416c; --gold: #ffd700; }
        body { margin: 0; background: #0a0a12; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #ui-layer { 
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-around; align-items: center; 
            background: rgba(0,0,0,0.95); z-index: 2000; border-bottom: 1px solid #444; 
        }
        .stat { text-align: center; font-weight: bold; font-size: 14px; }
        .nav-btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }

        #timer-box { 
            position: absolute; top: 70px; right: 80px; 
            display: flex; flex-direction: column; align-items: flex-end; gap: 5px; z-index: 900; 
        }
        .speed-btn { 
            background: #34495e; color: white; border: 1px solid #7f8c8d; 
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; 
        }

        #game-container { display: flex; height: 100vh; padding-top: 60px; box-sizing: border-box; }
        #arena { flex: 1; position: relative; background: #141e30; overflow: hidden; background-image: radial-gradient(#243b55 1px, transparent 1px); background-size: 40px 40px; }
        
        #wall { position: absolute; left: 45%; top: 0; width: 35px; height: 100%; background: #34495e; border-left: 6px solid #2c3e50; border-right: 6px solid #2c3e50; z-index: 100; box-shadow: 0 0 25px black; transition: 0.5s; }

        #enemy-castle { 
            position: absolute; right: 0; top: 0; width: 60px; height: 100%; 
            background: #1a0505; border-left: 5px solid var(--e-color); z-index: 90; 
            display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
            box-shadow: 0 0 40px rgba(255, 65, 108, 0.5);
        }
        .portal-icon { font-size: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 10px var(--e-color); } 100% { transform: scale(1); opacity: 0.8; } }

        #sidebar { 
            width: 320px; background: #1a1a2e; padding: 15px; border-right: 2px solid #333; 
            overflow-y: auto; box-sizing: border-box; z-index: 1500; transition: transform 0.3s ease;
        }

        #market-toggle {
            position: fixed; bottom: 20px; left: 20px; z-index: 3000;
            background: var(--gold); color: black; border: 2px solid white; border-radius: 50%;
            width: 60px; height: 60px; font-size: 28px; cursor: pointer; display: none; align-items: center; justify-content: center;
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; bottom: 0; left: 0; width: 100%; height: 45vh; border-top: 3px solid #444; transform: translateY(100%); }
            #sidebar.open { transform: translateY(0); }
            #market-toggle { display: flex; }
            #wall { left: 40%; }
        }

        .card { background: #16213e; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 2px solid transparent; transition: 0.3s; cursor: pointer; }
        .card.locked { opacity: 0.3; cursor: not-allowed; }
        .card.selected { border-color: var(--p-color); background: #1f4068; }
        
        .buy-group { display: none; margin-top: 10px; gap: 4px; }
        .card.selected .buy-group { display: flex; }
        .buy-group button { background: var(--gold); color: black; border: none; padding: 6px; border-radius: 5px; flex: 1; font-weight: bold; cursor: pointer; font-size: 11px; }

        .unit { position: absolute; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; z-index: 50; }
        .p-unit { background: var(--p-color); box-shadow: 0 0 8px var(--p-color); }
        .e-unit { background: var(--e-color); box-shadow: 0 0 8px var(--e-color); }
        .archer-unit { background: #9b59b6; border: 1px solid #fff; z-index: 110; width: 22px; height: 22px; font-size: 12px; }
        
        .h-unit { background: #ffd700; box-shadow: 0 0 15px #ffd700, 0 0 30px #ff8c00; width: 34px; height: 34px; font-size: 20px; z-index: 120; border: 2px solid white; }

        .arrow { position: absolute; width: 10px; height: 2px; background: yellow; z-index: 40; border-radius: 2px; }

        #blue-flag { position: absolute; font-size: 40px; z-index: 80; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }
        #countdown-txt { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); color: #ff416c; font-size: 80px; font-weight: bold; z-index: 4000; display: none; text-shadow: 0 0 20px black; }
        #game-over-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: #ff416c; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000; font-size: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stat">💰 <span id="gold-val">1200</span></div>
    <div class="stat">🏰 <span id="w-hp-txt">15000</span></div> <div>
        <button id="play-btn" class="nav-btn" style="background:#2ecc71; color:white" onclick="toggleGame()">BAŞLAT</button>
        <button class="nav-btn" style="background:#e74c3c; color:white" onclick="location.reload()">SIFIRLA</button>
    </div>
    <div class="stat">⚔️ W: <span id="wave-val">1</span></div>
</div>

<div id="timer-box">
    <button class="speed-btn" onclick="changeSpeed()">HIZ: <span id="speed-txt">1x</span></button>
    <span id="time-val" style="font-weight: bold; color: var(--gold);">00:00</span>
</div>

<button id="market-toggle" onclick="toggleSidebar()">🛒</button>

<div id="game-container">
    <div id="sidebar"><div id="cards-container"></div></div>
    <div id="arena">
        <div id="wall"></div>
        <div id="blue-flag">🎌</div>
        <div id="countdown-txt">10</div>
        
        <div id="enemy-castle">
            <div class="portal-icon">🌀</div>
            <div class="portal-icon">👹</div>
            <div class="portal-icon">🌀</div>
        </div>
    </div>
</div>

<div id="game-over-screen">
    <div>KAYBETTİNİZ!</div>
    <button onclick="location.reload()" style="margin-top:20px; padding: 10px 20px; font-size:20px; background:var(--gold); border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Yeniden Başla</button>
</div>

<script>
    let gold = 1200, wave = 1, wallHp = 15000, isRunning = false, isGameOver = false; // Sur HP 15000 yapıldı
    let players = [], enemies = [], arrows = [], archers = [];
    let selectedUnit = null, gameTime = 0, gameSpeed = 1, spawnTimer;

    let heroCount = 0;
    const maxHeroes = 500; // Kahraman sınırı 500 oldu

    let flagActive = false;
    let flagTimerFrames = 0;
    let flagCountdown = 10;
    
    let flagPos = { x: window.innerWidth * 0.15, y: window.innerHeight * 0.5 };
    let flagEl = document.getElementById('blue-flag');
    flagEl.style.left = flagPos.x + "px";
    flagEl.style.top = flagPos.y + "px";

    function changeSpeed() {
        if(gameSpeed === 1) gameSpeed = 2;
        else if(gameSpeed === 2) gameSpeed = 4;
        else gameSpeed = 1;
        document.getElementById('speed-txt').innerText = gameSpeed + "x";
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    setInterval(() => { if(isRunning && !isGameOver) { gameTime++; updateTimer(); } }, 1000);
    function updateTimer() {
        let mins = Math.floor(gameTime/60).toString().padStart(2,'0');
        let secs = (gameTime%60).toString().padStart(2,'0');
        document.getElementById('time-val').innerText = `${mins}:${secs}`;
    }

    const cardsContainer = document.getElementById('cards-container');

    // Yeni Çoklu Butonlu Kahraman Kartı
    let heroCard = document.createElement('div');
    heroCard.className = 'card';
    heroCard.style.borderColor = '#ffd700';
    heroCard.style.background = '#2c220b';
    heroCard.innerHTML = `<b>🌟 Muhteşem Kahraman</b><br><small>Güç: 9999 | Hasar: Kritik | Ücretsiz</small>
        <div style="margin-top:10px; display:flex; gap:4px;">
            <button onclick="buyHero(1, event)" style="background:var(--gold); color:black; border:none; padding:6px; border-radius:5px; flex:1; font-weight:bold; cursor:pointer; font-size:11px;">1x</button>
            <button onclick="buyHero(10, event)" style="background:var(--gold); color:black; border:none; padding:6px; border-radius:5px; flex:1; font-weight:bold; cursor:pointer; font-size:11px;">10x</button>
            <button onclick="buyHero(35, event)" style="background:var(--gold); color:black; border:none; padding:6px; border-radius:5px; flex:1; font-weight:bold; cursor:pointer; font-size:11px;">35x</button>
        </div>
        <div style="text-align:center; font-size:11px; margin-top:6px; color:#ddd;">Üretilen: <span id="hero-count-txt">0</span> / 500</div>`;
    cardsContainer.appendChild(heroCard);

    for(let i=1; i<=50; i++) {
        let pwr = 40 + (i*6); let cost = 15 + (i*3);
        let card = document.createElement('div');
        card.id = `card-${i}`; card.className = 'card locked';
        card.innerHTML = `<b>Seviye ${i}</b><br><small>Güç: ${pwr} | ${cost}G</small>
            <div class="buy-group">
                <button onclick="buyUnits(1, ${cost}, ${pwr}, event)">1x</button>
                <button onclick="buyUnits(10, ${cost}, ${pwr}, event)">10x</button>
                <button onclick="buyUnits(20, ${cost}, ${pwr}, event)">20x</button>
                <button onclick="buyUnits(50, ${cost}, ${pwr}, event)">50x</button>
            </div>
            <span style="font-size:10px; color:#ff416c">Wave ${i} Kilidi</span>`;
        card.onclick = () => { if(wave >= i) { 
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected'); selectedUnit = {id:i, hp:pwr, cost:cost};
        }};
        cardsContainer.appendChild(card);
    }

    // Kahraman satın alma fonksiyonu çoklu üretim için güncellendi
    function buyHero(amount, e) {
        e.stopPropagation();
        
        // Eğer 500'ü geçecekse, sadece kalan limiti üret
        if (heroCount + amount > maxHeroes) {
            amount = maxHeroes - heroCount;
        }
        
        if (amount <= 0) return; // Limit doluysa hiçbir şey yapma
        
        heroCount += amount;
        document.getElementById('hero-count-txt').innerText = heroCount;
        
        for(let i=0; i<amount; i++) {
            let p = { 
                hp: 9999, 
                x: Math.random() * (window.innerWidth * 0.35), 
                y: 60 + Math.random()*(window.innerHeight-120), 
                speed: 0, 
                damage: 50,
                el: null 
            };
            p.el = createUnitEl(p, 'h-unit', '🦸‍♂️');
            players.push(p);
        }
        
        if(window.innerWidth <= 768) toggleSidebar();
    }

    function createArchers() {
        const arenaHeight = window.innerHeight - 60;
        for(let i=0; i<25; i++) {
            let y = (i + 1) * (arenaHeight / 26);
            let div = document.createElement('div');
            div.className = 'unit archer-unit'; div.innerText = '🏹';
            div.style.left = "45%"; div.style.top = y + "px";
            document.getElementById('arena').appendChild(div);
            let a = { x: window.innerWidth * 0.45, y: y, lastShot: 0, el: div };
            archers.push(a);
        }
    }
    createArchers();

    function buyUnits(count, cost, hp, e) {
        e.stopPropagation();
        if(gold < cost * count) return;
        gold -= cost * count;
        for(let i=0; i<count; i++) {
            let p = { hp: hp, x: Math.random() * (window.innerWidth * 0.35), y: 60 + Math.random()*(window.innerHeight-120), speed: 0, damage: 2, el: null }; 
            p.el = createUnitEl(p, 'p-unit', '⚔️');
            players.push(p);
        }
        updateUI();
        if(window.innerWidth <= 768) toggleSidebar();
    }

    function createUnitEl(u, cls, ico) {
        let div = document.createElement('div');
        div.className = 'unit ' + cls; div.innerText = ico;
        div.style.left = u.x + "px"; div.style.top = u.y + "px";
        document.getElementById('arena').appendChild(div); return div;
    }

    function toggleGame() { 
        if(isGameOver) return;
        isRunning = !isRunning; 
        document.getElementById('play-btn').innerText = isRunning ? "DURDUR" : "DEVAM";
        if(isRunning) { loop(); spawnEnemy(); }
        else clearTimeout(spawnTimer);
    }

    function triggerGameOver() {
        isRunning = false;
        isGameOver = true;
        document.getElementById('game-over-screen').style.display = "flex";
        document.getElementById('countdown-txt').style.display = "none";
    }

    function spawnEnemy() {
        if(!isRunning || isGameOver) return;
        let count = 1 + Math.floor(wave / 4);
        for(let i=0; i<count; i++){
            // Düşmanlar erken aşamalarda çok daha güçlü ve hızlı (HP: 200'den başlıyor)
            let e = { x: window.innerWidth - 70, y: 60 + Math.random()*(window.innerHeight-120), speed: 1.5 + (wave*0.08), hp: 200 + (wave*50), el: null };
            e.el = createUnitEl(e, 'e-unit', '💀');
            enemies.push(e);
        }
        spawnTimer = setTimeout(spawnEnemy, Math.max(500, 2000 - (wave*100)) / gameSpeed);
    }

    function loop() {
        if(!isRunning || isGameOver) return;

        let enemyAtFlag = false;

        for(let s=0; s < gameSpeed; s++) {
            
            if(wallHp > 0) {
                archers.forEach(a => {
                    let target = enemies.find(e => e.x > (window.innerWidth * 0.46) && e.x < (window.innerWidth * 0.65));
                    if(target && Date.now() - a.lastShot > 1100) { fireArrow(a, target); a.lastShot = Date.now(); }
                });
            }

            arrows.forEach((arr, idx) => {
                arr.x += arr.vx; arr.y += arr.vy;
                enemies.forEach(e => {
                    if(Math.hypot(arr.x - e.x, arr.y - e.y) < 20) { e.hp -= 15; arr.el.remove(); arrows.splice(idx, 1); }
                });
                if(arr.x > window.innerWidth || arr.x < 0) { if(arr.el.parentNode) arr.el.remove(); arrows.splice(idx, 1); }
            });

            enemies.forEach(e => {
                if(wallHp > 0) {
                    if(e.x > (window.innerWidth * 0.48)) e.x -= e.speed; else wallHp -= 1.5;
                } else {
                    let t = findNearest(e, players);
                    if(t && Math.hypot(e.x - t.x, e.y - t.y) < 200) { 
                        moveTowards(e, t, false); 
                    } else {
                        let dx = flagPos.x - e.x, dy = flagPos.y - e.y;
                        let dist = Math.hypot(dx, dy);
                        if(dist > 25) {
                            e.x += (dx/dist)*e.speed; e.y += (dy/dist)*e.speed;
                        } else {
                            enemyAtFlag = true;
                        }
                    }
                }
            });

            players.forEach(p => {
                if(wallHp <= 0) {
                    let t = findNearest(p, enemies);
                    if(t) moveTowards(p, t, true); 
                }
            });

            if(enemyAtFlag) {
                if(!flagActive) {
                    flagActive = true;
                    flagCountdown = 10;
                    flagTimerFrames = 0;
                    document.getElementById('countdown-txt').style.display = "block";
                    document.getElementById('countdown-txt').innerText = flagCountdown;
                }
                flagTimerFrames++;
                if(flagTimerFrames >= 60) {
                    flagTimerFrames = 0;
                    flagCountdown--;
                    document.getElementById('countdown-txt').innerText = flagCountdown;
                    if(flagCountdown <= 0) { triggerGameOver(); }
                }
            } else {
                flagActive = false;
                document.getElementById('countdown-txt').style.display = "none";
            }

            enemies = enemies.filter(e => e.hp > 0 || (gold += (10+wave), e.el.remove(), false));
            players = players.filter(p => p.hp > 0 || (p.el.remove(), false));
        }

        if(wallHp <= 0 && archers.length > 0) { 
            document.getElementById('wall').style.opacity = "0.1"; 
            wallHp = 0;
            archers.forEach(a => { if(a.el) a.el.remove(); });
            archers = []; 
        }

        arrows.forEach(arr => { arr.el.style.left = arr.x + "px"; arr.el.style.top = arr.y + "px"; });
        enemies.forEach(e => { e.el.style.left = e.x + "px"; e.el.style.top = e.y + "px"; });
        players.forEach(p => { p.el.style.left = p.x + "px"; p.el.style.top = p.y + "px"; });

        if(Math.random() < 0.001) { wave++; checkUnlocks(); }
        
        updateUI();
        if(!isGameOver) requestAnimationFrame(loop);
    }

    function checkUnlocks() {
        for(let i=1; i<=50; i++) {
            let card = document.getElementById(`card-${i}`);
            if(wave >= i && card) card.classList.remove('locked');
        }
    }

    function fireArrow(a, t) {
        let el = document.createElement('div'); el.className = 'arrow';
        document.getElementById('arena').appendChild(el);
        let dx = t.x - a.x, dy = t.y - a.y, dist = Math.hypot(dx, dy);
        arrows.push({ el, x: a.x, y: a.y, vx: (dx/dist)*12, vy: (dy/dist)*12 });
    }

    function findNearest(me, list) {
        let n = null, d = Infinity;
        list.forEach(t => { let dist = Math.hypot(me.x - t.x, me.y - t.y); if(dist < d) { d = dist; n = t; } });
        return n;
    }

    function moveTowards(me, t, isPlayer) {
        let dx = t.x - me.x, dy = t.y - me.y, dist = Math.hypot(dx, dy);
        let attackRange = 35; 

        if(dist > attackRange) { 
            if (!isPlayer) {
                me.x += (dx/dist)*me.speed; 
                me.y += (dy/dist)*me.speed; 
            }
        } else {
            t.hp -= isPlayer ? me.damage : 1.5; 
        }
    }

    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(gold);
        document.getElementById('wave-val').innerText = wave;
        document.getElementById('w-hp-txt').innerText = Math.max(0, Math.floor(wallHp));
    }
    checkUnlocks();
</script>
</body>
</html>
