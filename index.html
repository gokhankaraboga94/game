<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonsuz Kuşatma: Kale Savunması</title>
    <style>
        :root { --p-color: #00d2ff; --e-color: #ff416c; --gold: #ffd700; }
        body { margin: 0; background: #0a0a12; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* ÜST PANEL */
        #ui-layer { 
            position: absolute; top: 0; width: 100%; height: 70px;
            display: flex; justify-content: space-around; align-items: center; 
            background: rgba(0,0,0,0.9); z-index: 1000; border-bottom: 2px solid #444; 
        }
        .stat { text-align: center; font-weight: bold; min-width: 120px; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 0 5px; transition: 0.3s; }

        #timer-box { position: absolute; top: 85px; right: 25px; font-size: 18px; color: var(--gold); z-index: 1100; font-weight: bold; }

        #game-container { display: flex; height: 100vh; padding-top: 70px; box-sizing: border-box; }
        
        /* ASKER MARKETİ */
        #sidebar { width: 340px; background: #1a1a2e; padding: 15px; border-right: 2px solid #333; overflow-y: auto; box-sizing: border-box; }
        .card { background: #16213e; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 2px solid transparent; transition: 0.3s; position: relative; }
        .card.locked { opacity: 0.4; cursor: not-allowed; grayscale: 1; }
        .card.selected { border-color: var(--p-color); background: #1f4068; box-shadow: 0 0 15px rgba(0,210,255,0.3); }
        
        .buy-group { display: none; margin-top: 10px; gap: 8px; justify-content: center; }
        .card.selected .buy-group { display: flex; }
        .buy-group button { background: var(--gold); border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .buy-group button:hover { transform: scale(1.1); }

        /* SAVAŞ ALANI */
        #arena { flex: 1; position: relative; background: #141e30; overflow: hidden; background-image: radial-gradient(#243b55 1px, transparent 1px); background-size: 40px 40px; }
        #wall { position: absolute; left: 480px; top: 0; width: 45px; height: 100%; background: #34495e; border-left: 8px solid #2c3e50; border-right: 8px solid #2c3e50; z-index: 100; box-shadow: 0 0 30px black; transition: 0.5s; }

        /* BİRİMLER */
        .unit { position: absolute; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; z-index: 50; border: 1px solid rgba(255,255,255,0.2); }
        .p-unit { background: var(--p-color); box-shadow: 0 0 10px var(--p-color); }
        .e-unit { background: var(--e-color); box-shadow: 0 0 10px var(--e-color); }
        .archer-unit { background: #9b59b6; border: 2px solid #fff; z-index: 110; width: 24px; height: 24px; font-size: 14px; }
        .arrow { position: absolute; width: 12px; height: 3px; background: yellow; z-index: 40; border-radius: 2px; box-shadow: 0 0 5px orange; }
        .lock-info { font-size: 11px; color: #ff416c; font-weight: bold; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="stat">💰 ALTIN: <span id="gold-val">1200</span></div>
    <div class="stat">🏰 SUR CANI: <span id="w-hp-txt">2500</span></div>
    <div>
        <button id="play-btn" class="nav-btn" style="background:#2ecc71; color:white" onclick="toggleGame()">BAŞLAT</button>
        <button class="nav-btn" style="background:#e74c3c; color:white" onclick="location.reload()">SIFIRLA</button>
    </div>
    <div class="stat">⚔️ WAVE: <span id="wave-val">1</span></div>
</div>

<div id="timer-box">SÜRE: <span id="time-val">00:00</span></div>

<div id="game-container">
    <div id="sidebar"><div id="cards-container"></div></div>
    <div id="arena">
        <div id="wall"></div>
    </div>
</div>

<script>
    let gold = 1200, wave = 1, wallHp = 2500, isRunning = false;
    let players = [], enemies = [], arrows = [], archers = [];
    let selectedUnit = null, gameTime = 0, spawnTimer;

    // SÜRE SAYACI
    setInterval(() => { if(isRunning) { gameTime++; updateTimer(); } }, 1000);
    function updateTimer() {
        let mins = Math.floor(gameTime/60).toString().padStart(2,'0');
        let secs = (gameTime%60).toString().padStart(2,'0');
        document.getElementById('time-val').innerText = `${mins}:${secs}`;
    }

    // 50 KARAKTERLİ MARKET OLUŞTURMA
    const cardsContainer = document.getElementById('cards-container');
    for(let i=1; i<=50; i++) {
        let pwr = 40 + (i*6); 
        let cost = 15 + (i*3); 
        let unlock = i; // Her dalga bir kilit açar
        
        let card = document.createElement('div');
        card.id = `card-${i}`; card.className = 'card locked';
        card.innerHTML = `
            <b>Seviye ${i} Savaşçı</b><br><small>Güç: ${pwr} | ${cost} Altın</small>
            <div class="buy-group">
                <button onclick="buyUnits(10, ${cost}, ${pwr}, event)">10x</button>
                <button onclick="buyUnits(20, ${cost}, ${pwr}, event)">20x</button>
                <button onclick="buyUnits(50, ${cost}, ${pwr}, event)">50x</button>
            </div>
            <span class="lock-info">Wave ${unlock} Kilidi</span>
        `;
        card.onclick = () => { if(wave >= unlock) selectCard(card, i, pwr, cost); };
        cardsContainer.appendChild(card);
    }

    function selectCard(el, id, hp, cost) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedUnit = { id, hp, cost };
    }

    // 25 OKÇU OLUŞTURMA (SUR ÜZERİNE SIKI DİZİLİM)
    function createArchers() {
        const arenaHeight = window.innerHeight - 70;
        for(let i=0; i<25; i++) {
            let y = 30 + (i * (arenaHeight / 26));
            let a = { x: 488, y: y, lastShot: Date.now() + Math.random()*1000 };
            let div = document.createElement('div');
            div.className = 'unit archer-unit'; div.innerText = '🏹';
            div.style.left = "488px"; div.style.top = y + "px";
            document.getElementById('arena').appendChild(div);
            archers.push(a);
        }
    }
    createArchers();

    function buyUnits(count, cost, hp, e) {
        e.stopPropagation();
        if(gold < cost * count) return alert("Altın Yetersiz!");
        gold -= cost * count;
        for(let i=0; i<count; i++) {
            let p = { hp: hp, x: 50 + Math.random()*380, y: 50 + Math.random()*(window.innerHeight-150), speed: 2, el: null };
            p.el = createUnitEl(p, 'p-unit', '⚔️');
            players.push(p);
        }
        updateUI();
    }

    function createUnitEl(u, cls, ico) {
        let div = document.createElement('div');
        div.className = 'unit ' + cls; div.innerText = ico;
        div.style.left = u.x + "px"; div.style.top = u.y + "px";
        document.getElementById('arena').appendChild(div); return div;
    }

    function toggleGame() { 
        isRunning = !isRunning; 
        document.getElementById('play-btn').innerText = isRunning ? "DURDUR" : "DEVAM ET";
        if(isRunning) { loop(); spawnEnemy(); }
    }

    function spawnEnemy() {
        if(!isRunning) return;
        let e = { 
            x: window.innerWidth + 50, 
            y: Math.random() * (window.innerHeight - 100), 
            speed: 1.2 + (wave * 0.05), 
            hp: 30 + (wave * 25), 
            el: null 
        };
        e.el = createUnitEl(e, 'e-unit', '💀');
        enemies.push(e);
        spawnTimer = setTimeout(spawnEnemy, Math.max(500, 2000 - (wave * 100)));
    }

    function loop() {
        if(!isRunning) return;

        // OKÇU ATIŞLARI (25 OKÇU)
        archers.forEach(a => {
            let target = enemies.find(e => e.x > 530 && e.x < window.innerWidth);
            if(target && Date.now() - a.lastShot > 1000) { 
                fireArrow(a, target); a.lastShot = Date.now(); 
            }
        });

        // OK HAREKETİ
        arrows.forEach((arr, idx) => {
            arr.x += arr.vx; arr.y += arr.vy;
            arr.el.style.left = arr.x + "px"; arr.el.style.top = arr.y + "px";
            enemies.forEach(e => {
                if(Math.hypot(arr.x - e.x, arr.y - e.y) < 20) { 
                    e.hp -= 15; arr.el.remove(); arrows.splice(idx, 1); 
                }
            });
            if(arr.x > window.innerWidth || arr.x < 0) { if(arr.el.parentNode) arr.el.remove(); arrows.splice(idx, 1); }
        });

        // DÜŞMAN MANTIĞI
        enemies.forEach(e => {
            if(wallHp > 0) {
                if(e.x > 535) e.x -= e.speed; else wallHp -= 0.7;
            } else {
                let t = findNearest(e, players);
                if(t) moveTowards(e, t, false); else e.x -= e.speed;
            }
            e.el.style.left = e.x + "px"; e.el.style.top = e.y + "px";
        });

        // OYUNCU MANTIĞI (BEKLEME VE SALDIRI)
        players.forEach(p => {
            let t = findNearest(p, enemies);
            if(t) {
                if(wallHp > 0 && t.x > 530) { 
                    if(p.x < 430) p.x += p.speed; // Sur yıkılana kadar arkada bekle
                } else {
                    moveTowards(p, t, true); // Sur yıkılınca saldır
                }
            }
            p.el.style.left = p.x + "px"; p.el.style.top = p.y + "px";
        });

        // TEMİZLİK VE DALGA ARTIŞI
        enemies = enemies.filter(e => e.hp > 0 || (gold += (10+wave), e.el.remove(), false));
        players = players.filter(p => p.hp > 0 || (p.el.remove(), false));

        if(wallHp <= 0) { document.getElementById('wall').style.opacity = "0.1"; wallHp = 0; }
        if(Math.random() < 0.001) { wave++; checkUnlocks(); }
        
        updateUI();
        if(players.length > 0 || wallHp > 0 || enemies.length > 0) requestAnimationFrame(loop);
    }

    function checkUnlocks() {
        for(let i=1; i<=50; i++) {
            let card = document.getElementById(`card-${i}`);
            if(wave >= i) { 
                card.classList.remove('locked'); 
                let info = card.querySelector('.lock-info'); if(info) info.innerText = "KİLİT AÇILDI ✅";
            }
        }
    }

    function fireArrow(a, t) {
        let el = document.createElement('div'); el.className = 'arrow';
        document.getElementById('arena').appendChild(el);
        let dx = t.x - a.x, dy = t.y - a.y, dist = Math.hypot(dx, dy);
        arrows.push({ el, x: a.x, y: a.y, vx: (dx/dist)*12, vy: (dy/dist)*12 });
    }

    function findNearest(me, list) {
        let n = null, d = Infinity;
        list.forEach(t => { let dist = Math.hypot(me.x - t.x, me.y - t.y); if(dist < d) { d = dist; n = t; } });
        return n;
    }

    function moveTowards(me, t, isP) {
        let dx = t.x - me.x, dy = t.y - me.y, dist = Math.hypot(dx, dy);
        if(dist > 25) { me.x += (dx/dist)*me.speed; me.y += (dy/dist)*me.speed; }
        else t.hp -= isP ? 2 : 0.4;
    }

    function updateUI() {
        document.getElementById('gold-val').innerText = Math.floor(gold);
        document.getElementById('wave-val').innerText = wave;
        document.getElementById('w-hp-txt').innerText = Math.max(0, Math.floor(wallHp));
    }

    checkUnlocks();
</script>
</body>
</html>
